server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache longo para assets com hash no nome (Vite gera nome com hash)
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html sem cache (sempre busca a versão mais recente)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Roteamento SPA: qualquer rota desconhecida serve o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
